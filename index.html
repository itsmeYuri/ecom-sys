<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Threap Glailz</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }
    .card {
      width: min(760px, 92vw);
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.06);
    }
    h1 { margin: 0 0 8px; font-size: 1.6rem; }
    p { margin: 0 0 16px; color: #555; }
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    a {
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #d7d7d7;
      color: #111;
      font-weight: 600;
      font-size: .92rem;
      background: #fff;
    }
    a.primary { background: #111; color: #fff; border-color: #111; }
    .small { margin-top: 12px; font-size: .85rem; color: #666; }
  </style>
  <script>
    (function () {
      var appUrl = '/shop-system/index.php';
      if (window.location.protocol.startsWith('http')) {
        window.location.replace(appUrl);
      }
    })();
  </script>
</head>
<body>
  <div class="card">
    <h1>Threap Glailz Connected</h1>
    <p>This `index.html` is connected to your dynamic PHP + MySQL e-commerce system.</p>
    <div class="links">
      <a class="primary" href="/shop-system/index.php">Open Store</a>
      <a href="/shop-system/shop.php">Shop Page</a>
      <a href="/shop-system/cart.php">Cart</a>
      <a href="/shop-system/login.php">Login</a>
      <a href="/shop-system/register.php">Register</a>
      <a href="/shop-system/admin/login.php">Admin</a>
    </div>
    <div class="small">
      If this page does not redirect, open it through XAMPP Apache: <strong>http://localhost/</strong>
    </div>
  </div>
</body>
</html>
